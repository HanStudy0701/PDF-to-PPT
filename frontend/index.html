<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF to Editable PPTX Web App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs" type="module"></script>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <main class="max-w-7xl mx-auto p-6 space-y-6">
      <header class="space-y-2">
        <h1 class="text-3xl font-bold">PDF → Editable PPTX Converter</h1>
        <p class="text-slate-300">專為 NotebookLM 簡報 PDF 設計：盡量拆成可編輯文字、圖片、icon、shape，而不是整頁截圖。</p>
      </header>

      <section class="grid lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 bg-slate-900 border border-slate-700 rounded-xl p-4 space-y-4">
          <h2 class="font-semibold text-lg">1) 上傳與設定</h2>
          <div id="dropZone" class="border-2 border-dashed border-slate-600 rounded-lg p-6 text-center cursor-pointer hover:border-cyan-400">
            <p class="font-medium">Drag & Drop PDF</p>
            <p class="text-slate-400 text-sm">或點擊上傳</p>
            <input id="pdfInput" type="file" accept="application/pdf" class="hidden" />
          </div>
          <div id="fileInfo" class="text-sm text-slate-300"></div>

          <label class="block text-sm">模式</label>
          <select id="mode" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm">
            <option value="maximum_editable">Maximum Editable Mode</option>
            <option value="visual_fidelity">Visual Fidelity Mode</option>
            <option value="hybrid_safe">Hybrid Safe Mode</option>
          </select>

          <div class="grid grid-cols-1 gap-2 text-sm">
            <label><input id="enable_ocr" type="checkbox" class="mr-2" />啟用 OCR</label>
            <label><input id="enable_inpainting" type="checkbox" class="mr-2" checked />背景補洞</label>
            <label><input id="keep_reference_bg" type="checkbox" class="mr-2" />保留完整頁面底圖</label>
            <label><input id="merge_nearby_text" type="checkbox" class="mr-2" checked />合併相鄰文字</label>
            <label><input id="split_icons" type="checkbox" class="mr-2" checked />拆解 icon</label>
            <label><input id="prefer_fonts" type="checkbox" class="mr-2" checked />優先還原字體</label>
            <label><input id="debug_report" type="checkbox" class="mr-2" checked />輸出 debug report</label>
          </div>

          <button id="convertBtn" class="w-full px-4 py-2 bg-cyan-500 rounded font-semibold text-slate-900 disabled:opacity-50" disabled>開始轉換</button>
          <p id="status" class="text-sm"></p>

          <div id="downloads" class="hidden space-y-2 pt-2 border-t border-slate-700">
            <h3 class="font-semibold">2) 下載結果</h3>
            <div class="flex flex-wrap gap-2 text-sm">
              <a id="dlPptx" class="px-3 py-2 rounded bg-emerald-500 text-slate-900">PPTX</a>
              <a id="dlAssets" class="px-3 py-2 rounded bg-slate-700">素材 ZIP</a>
              <a id="dlReport" class="px-3 py-2 rounded bg-slate-700">Report JSON</a>
              <a id="dlIR" class="px-3 py-2 rounded bg-slate-700">IR JSON</a>
              <a id="dlErrors" class="px-3 py-2 rounded bg-slate-700">Errors</a>
            </div>
          </div>
        </div>

        <div class="lg:col-span-2 bg-slate-900 border border-slate-700 rounded-xl p-4 space-y-4">
          <h2 class="font-semibold text-lg">3) 預覽</h2>
          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <p class="text-sm mb-2">原始 PDF（第 1 頁）</p>
              <canvas id="pdfCanvas" class="w-full border border-slate-700 rounded bg-white"></canvas>
            </div>
            <div>
              <p class="text-sm mb-2">轉換後層級預覽（第 1 頁）</p>
              <img id="afterImg" class="w-full border border-slate-700 rounded" alt="after" />
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module">
      import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs';
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.worker.min.mjs';

      const dropZone = document.getElementById('dropZone');
      const pdfInput = document.getElementById('pdfInput');
      const convertBtn = document.getElementById('convertBtn');
      const fileInfo = document.getElementById('fileInfo');
      const statusEl = document.getElementById('status');
      const pdfCanvas = document.getElementById('pdfCanvas');
      const afterImg = document.getElementById('afterImg');

      let selectedFile = null;

      dropZone.addEventListener('click', () => pdfInput.click());
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-cyan-400'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-cyan-400'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-cyan-400');
        if (e.dataTransfer.files?.[0]) handleFile(e.dataTransfer.files[0]);
      });
      pdfInput.addEventListener('change', (e) => {
        if (e.target.files?.[0]) handleFile(e.target.files[0]);
      });

      async function handleFile(file) {
        if (file.type !== 'application/pdf') {
          statusEl.textContent = '請上傳 PDF 檔案';
          return;
        }
        selectedFile = file;
        convertBtn.disabled = false;
        const pageCount = await renderPdfFirstPage(file);
        fileInfo.textContent = `檔名：${file.name}｜大小：${(file.size / 1024 / 1024).toFixed(2)} MB｜頁數：${pageCount}`;
        statusEl.textContent = '';
      }

      async function renderPdfFirstPage(file) {
        const bytes = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 1.3 });
        const ctx = pdfCanvas.getContext('2d');
        pdfCanvas.width = viewport.width;
        pdfCanvas.height = viewport.height;
        await page.render({ canvasContext: ctx, viewport }).promise;
        return pdf.numPages;
      }

      convertBtn.addEventListener('click', async () => {
        if (!selectedFile) return;
        convertBtn.disabled = true;
        statusEl.textContent = '轉換中，請稍候...';

        const fd = new FormData();
        fd.append('file', selectedFile);
        fd.append('mode', document.getElementById('mode').value);
        ['enable_ocr','enable_inpainting','keep_reference_bg','merge_nearby_text','split_icons','prefer_fonts','debug_report'].forEach((id) => {
          fd.append(id, document.getElementById(id).checked);
        });

        try {
          const res = await fetch('/api/convert', { method: 'POST', body: fd });
          if (!res.ok) throw new Error(await res.text());
          const data = await res.json();
          statusEl.textContent = `完成：共 ${data.pages} 頁`;

          const base = `/api/jobs/${data.job_id}`;
          document.getElementById('dlPptx').href = `${base}/download/pptx`;
          document.getElementById('dlAssets').href = `${base}/download/assets`;
          document.getElementById('dlReport').href = `${base}/download/report`;
          document.getElementById('dlIR').href = `${base}/download/ir`;
          document.getElementById('dlErrors').href = `${base}/download/errors`;
          document.getElementById('downloads').classList.remove('hidden');

          afterImg.src = `${base}/preview/after/1?t=${Date.now()}`;
        } catch (err) {
          statusEl.textContent = `失敗：${err.message}`;
        } finally {
          convertBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
